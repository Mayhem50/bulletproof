name: Build Skills

on:
  push:
    branches: [main]
    paths:
      - 'source/skills/**'
      - 'scripts/**'
  pull_request:
    branches: [main]
    paths:
      - 'source/skills/**'
      - 'scripts/**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm ci

      - run: npm run build

      - name: Check for uncommitted build changes
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git diff --name-only)" ]; then
            echo "::error::Built skills are out of sync with source. Run 'npm run build' and commit the results."
            git diff --stat
            exit 1
          fi

      - name: Auto-commit built skills
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .claude/ .cursor/ .gemini/ .codex/ .agents/ .kiro/ .opencode/ .trae/ .trae-cn/ .pi/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: rebuild provider skills from source"
            git push
          fi
